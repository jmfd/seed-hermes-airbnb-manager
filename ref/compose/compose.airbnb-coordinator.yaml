# Compose override added by seed-hermes-airbnb-manager.
#
# Adds THREE sidecar services to the seed-hermes scaffold:
#
#   1. hermes-owner       — gateway for the OWNER profile (boss skill).
#                           Binds the webhook adapter on host 127.0.0.1:8787 so
#                           Hostex callbacks (or a local DTU) can POST inbound.
#   2. hermes-owner-team  — gateway for the TEAM-LISTENER profile (listener skill).
#                           plow_chat WSS-only, no host port binding needed.
#   3. airbnb-courier     — the courier tick loop that re-pings stale asks,
#                           escalates at SLA, and wakes the owner gateway when
#                           a query is ready to draft a reply.
#
# Why per-profile gateway sidecars (not just `hermes -p <profile> gateway run`
# inside the main `hermes` container)?
#   Hermes' container PID 1 runs ONE gateway (the default profile). Background
#   processes spawned via `docker exec -d ... hermes -p <profile> gateway run`
#   die on every `docker compose up -d --force-recreate` — silently, with no
#   error message. The install becomes broken without anyone noticing until
#   the next webhook arrives and nothing happens. Compose services with
#   restart:unless-stopped survive recreates by design — this is the
#   reproducibility floor.
#
# Operator-neutral parameterization:
#   The service KEYS below (hermes-owner / hermes-owner-team) are
#   infrastructure identifiers chosen by the seed and have no semantic tie
#   to any specific operator. The operator's chosen handle appears in:
#     - container_name (visible in `docker ps`)
#     - env_file path (./data/profiles/${OWNER_PROFILE}/.env)
#     - the -p arg in the gateway command
#   ${OWNER_PROFILE} and ${TEAM_PROFILE} are written to the scaffold's
#   <scaffold>/.env file by install_airbnb_coordinator_into_compose.sh,
#   which prompts for them at install time. docker compose reads .env from
#   the project directory and substitutes them at compose-eval time.
#
# Loaded via COMPOSE_FILE=compose.yaml:[...]:compose.airbnb-coordinator.yaml
# in <scaffold>/.env (the install script writes this).

services:
  hermes-owner:
    image: ${HERMES_IMAGE:-nousresearch/hermes-agent:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-hermes}-hermes-${OWNER_PROFILE}
    user: "${HERMES_UID:-501}:${HERMES_GID:-20}"
    working_dir: /opt/data
    environment:
      HERMES_HOME: /opt/data
      HOME: /opt/data/home
      HERMES_YOLO_MODE: "1"
    env_file:
      - ./data/.env
      - ./data/profiles/${OWNER_PROFILE}/.env
    volumes:
      - ./data:/opt/data
    ports:
      # Webhook adapter — bound to host loopback only.
      # The owner profile owns the Hostex webhook subscription;
      # this is the port DTU (and real Hostex via tunnel) POSTs to.
      - "127.0.0.1:${HERMES_WEBHOOK_PORT:-8787}:8787"
    depends_on:
      - hermes
    restart: unless-stopped
    # Wrap with symlink so the courier's bash -lc 'hermes ...' calls work
    # inside this container too (gbrain installer already does this for gbrain).
    command:
      - bash
      - -c
      - |
        # v0.2.x: per-profile gateway needs hermes + gbrain + bun on PATH.
        ln -sf /opt/hermes/.venv/bin/hermes /usr/local/bin/hermes 2>/dev/null
        ln -sf /opt/data/home/.bun/bin/gbrain /usr/local/bin/gbrain 2>/dev/null
        ln -sf /opt/data/home/.bun/bin/bun /usr/local/bin/bun 2>/dev/null
        export HOME=/opt/data/home
        # NB: no apt-get at startup. PyYAML is wired by installer prereq.
        exec /opt/hermes/.venv/bin/hermes -p ${OWNER_PROFILE} gateway run

  hermes-owner-team:
    image: ${HERMES_IMAGE:-nousresearch/hermes-agent:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-hermes}-hermes-${TEAM_PROFILE}
    user: "${HERMES_UID:-501}:${HERMES_GID:-20}"
    working_dir: /opt/data
    environment:
      HERMES_HOME: /opt/data
      HOME: /opt/data/home
      HERMES_YOLO_MODE: "1"
    env_file:
      - ./data/.env
      - ./data/profiles/${TEAM_PROFILE}/.env
    volumes:
      - ./data:/opt/data
    depends_on:
      - hermes
    restart: unless-stopped
    command:
      - bash
      - -c
      - |
        # v0.2.x: per-profile gateway needs hermes + gbrain + bun on PATH.
        ln -sf /opt/hermes/.venv/bin/hermes /usr/local/bin/hermes 2>/dev/null
        ln -sf /opt/data/home/.bun/bin/gbrain /usr/local/bin/gbrain 2>/dev/null
        ln -sf /opt/data/home/.bun/bin/bun /usr/local/bin/bun 2>/dev/null
        export HOME=/opt/data/home
        # NB: no apt-get at startup. PyYAML is wired by installer prereq.
        exec /opt/hermes/.venv/bin/hermes -p ${TEAM_PROFILE} gateway run

  airbnb-courier:
    image: ${HERMES_IMAGE:-nousresearch/hermes-agent:latest}
    container_name: ${COMPOSE_PROJECT_NAME:-hermes}-airbnb-courier
    user: "${HERMES_UID:-501}:${HERMES_GID:-20}"
    working_dir: /opt/data
    environment:
      # Pin HOME to the subprocess HOME the Hermes terminal tool uses, so
      # gbrain / brain reads find /opt/data/home/.gbrain and
      # /opt/data/home/brain consistently with what the boss/listener
      # skills see.
      HOME: /opt/data/home
    env_file:
      # Sidecar-only config — secret keys for plow_chat re-pings.
      - ./data/.airbnb-courier.env
    volumes:
      - ./data:/opt/data
    depends_on:
      - hermes
      - hermes-owner
    restart: unless-stopped
    # PID 1 = bootstrap then exec tick loop.
    command:
      - bash
      - -c
      - |
        # v0.2.x: courier sidecar also needs hermes + gbrain on PATH for the
        # wakeAgent / mirror REST paths.
        ln -sf /opt/hermes/.venv/bin/hermes /usr/local/bin/hermes 2>/dev/null
        ln -sf /opt/data/home/.bun/bin/gbrain /usr/local/bin/gbrain 2>/dev/null
        ln -sf /opt/data/home/.bun/bin/bun /usr/local/bin/bun 2>/dev/null
        export HOME=/opt/data/home
        # NB: no apt-get at startup. PyYAML is wired by installer prereq.
        exec /opt/data/home/airbnb-courier/tick-loop.sh
    healthcheck:
      test: ["CMD", "pgrep", "-f", "tick-loop.sh"]
      interval: 60s
      timeout: 5s
      retries: 3
